# Continuous integration for the web app — lint, typecheck, build, e2e tests.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable corepack (yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        env:
          YARN_ENABLE_HARDENED_MODE: '0'

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://localhost:5432/dummy

      - name: Lint
        run: yarn lint || echo "::warning::Lint warnings present"
        continue-on-error: true

      - name: Typecheck
        run: yarn typecheck
        env:
          DATABASE_URL: postgresql://localhost:5432/dummy

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: corepack enable
      - run: yarn install --immutable
        env:
          YARN_ENABLE_HARDENED_MODE: '0'

      - name: Build (skip db push)
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          node scripts/generate-tambo-api-catalog.mjs || true
          node scripts/generate-tambo-ui-catalog.mjs || true
          yarn next build
        env:
          DATABASE_URL: postgresql://localhost:5432/dummy
          AUTH_SECRET: ci-secret-not-used
          JWT_SECRET: ci-secret-not-used
          CRON_SECRET: ci
          CRON_SECRET_TOKEN: ci

  test:
    name: Smoke + system tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: ci
          POSTGRES_DB: debdi_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: corepack enable
      - run: yarn install --immutable
        env:
          YARN_ENABLE_HARDENED_MODE: '0'

      - name: Push schema
        run: npx prisma db push --schema=prisma/schema.prisma --accept-data-loss
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/debdi_ci

      - name: Run system tests (cart math + ESC/POS + barcode)
        run: |
          node tests/system/cart-math.test.mjs
          node tests/system/escpos.test.mjs
          node tests/system/barcode.test.mjs

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: yarn next build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/debdi_ci
          AUTH_SECRET: ci
          JWT_SECRET: ci
          CRON_SECRET: ci
          CRON_SECRET_TOKEN: ci

      - name: Run Playwright tests
        run: yarn playwright test --pass-with-no-tests
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/debdi_ci
          AUTH_SECRET: ci
          JWT_SECRET: ci
          CRON_SECRET: ci
          CRON_SECRET_TOKEN: ci
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
