# Builds Android APK + Windows EXE on every push to main and tagged commits.
# Artifacts are uploaded to the workflow run; tagged commits attach them
# to a GitHub Release.
name: build-native

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Android APK ──────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: native/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI + plugins
        run: npm install --no-audit --no-fund

      - name: Init + add Android platform
        run: |
          # If android/ doesn't exist yet (first run), create it.
          if [ ! -d android ]; then
            # capacitor.config.json already exists; init is a no-op there.
            mkdir -p out
            echo '<!doctype html><html><head><meta http-equiv="refresh" content="0; url=https://debdi.uz" /></head><body>Loading…</body></html>' > out/index.html
            npx cap add android
          fi
          npx cap sync android

      - name: Build unsigned debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debdi-pos-android-debug
          path: native/android/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Build signed release APK + AAB
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat >> android/app/build.gradle <<GRADLE
android.signingConfigs {
    release {
        storeFile file('release.keystore')
        storePassword "$KEYSTORE_PASSWORD"
        keyAlias "$KEY_ALIAS"
        keyPassword "$KEY_PASSWORD"
    }
}
android.buildTypes.release.signingConfig android.signingConfigs.release
GRADLE
          cd android
          ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload signed APK + AAB
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: debdi-pos-android-release
          path: |
            native/android/android/app/build/outputs/apk/release/*.apk
            native/android/android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

  # ─── Windows installer + portable EXE ────────────────────────────────────
  windows:
    name: Windows EXE
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native/windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build NSIS installer + portable EXE
        run: npx electron-builder --win nsis portable --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debdi-pos-windows
          path: |
            native/windows/dist/*.exe
            native/windows/dist/*.msi
          if-no-files-found: warn
          retention-days: 90

  # ─── Release on tag ───────────────────────────────────────────────────────
  release:
    name: Attach to GitHub Release
    needs: [android, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/debdi-pos-android-debug/*.apk
            artifacts/debdi-pos-android-release/*.apk
            artifacts/debdi-pos-android-release/*.aab
            artifacts/debdi-pos-windows/*.exe
            artifacts/debdi-pos-windows/*.msi
          generate_release_notes: true
          draft: false
